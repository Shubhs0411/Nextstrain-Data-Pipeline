# H3N2 Snakemake pipeline config
# Paths relative to project root

# Raw data (segment_N.fasta, BVBRC_genome.txt)
data_dir: "H3N2_DATA/H3N2_DATA"
# Generated by scripts (metadata, cleaned FASTA)
output_dir: "H3N2_output"
results_dir: "results"
auspice_dir: "auspice"

# Reference for alignment (optional - leave empty to align without reference)
# Download from Nextstrain flu or use first sequence
reference: ""

# Subsampling: limit sequences to avoid OOM (0 = no limit, use full ~70k dataset)
# 3000-5000 recommended for MAFFT on typical machines; 70k+ needs 32GB+ RAM and 1-3 days
# For a full no-subsample run later: set to 0 and see docs/NEXTSTRAIN_OUTPUT_AND_FULL_BUILD.md
subsample_max_sequences: 5000

# Alignment: use multiple threads (default "auto" = all cores)
align_nthreads: "auto"

# TreeTime / refine parameters
clock_rate: 0.0008
coalescent: "skyline"

# Segment wildcard: 1-8
segments: [1, 2, 3, 4, 5, 6, 7, 8]

# Path A: use genome_id-keyed FASTA and metadata (set true after running Path A steps)
use_h3n2: true
